# Cloud Run service specification with startup probe configuration
apiVersion: serving.kn.dev/v1
kind: Service
metadata:
  name: subscription-backend
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/startup-cpu-boost: 'true'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/cloudsql-instances: box-subscription-system:us-central1:subscription-db
    spec:
      serviceAccountName: github-actions@box-subscription-system.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 600
      containers:
      - image: us-central1-docker.pkg.dev/box-subscription-system/subscription-backend/app:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: '4'
            memory: 2Gi
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          timeoutSeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
