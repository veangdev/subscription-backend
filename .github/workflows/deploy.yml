name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: subscription-backend
  REPO: subscription-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP with service account key
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve runtime service account
        id: runtime_sa
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          credentials = json.loads(os.environ["GCP_SA_KEY"])
          print(f"email={credentials['client_email']}")
          PY

      - name: Validate runtime service account
        shell: bash
        run: |
          test -n "${{ steps.runtime_sa.outputs.email }}"
          echo "Using runtime service account: ${{ steps.runtime_sa.outputs.email }}"

      - uses: google-github-actions/setup-gcloud@v2

      # Enable required APIs and grant permissions
      - name: Setup Cloud Services
        continue-on-error: true
        run: |
          echo "Enabling required APIs..."
          gcloud services enable \
            sqladmin.googleapis.com \
            sql-component.googleapis.com \
            secretmanager.googleapis.com \
            run.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet || true
          
          echo "Granting Cloud SQL Client role..."
          gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
            --member="serviceAccount:${{ steps.runtime_sa.outputs.email }}" \
            --role="roles/cloudsql.client" \
            --condition=None \
            --quiet || true
          
          echo "Granting Secret Manager Accessor role..."
          gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
            --member="serviceAccount:${{ steps.runtime_sa.outputs.email }}" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None \
            --quiet || true

          echo "Granting Storage Object Admin role on images bucket..."
          gcloud storage buckets add-iam-policy-binding gs://box-subscription-system-images \
            --member="serviceAccount:${{ steps.runtime_sa.outputs.email }}" \
            --role="roles/storage.objectAdmin" \
            --quiet || true

      # Let Docker push to Artifact Registry
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Create or update Firebase service account secret
      - name: Setup Firebase credentials in Secret Manager
        run: |
          echo "Setting up Firebase service account secret..."
          
          # Check if secret exists
          if gcloud secrets describe firebase-service-account --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null; then
            echo "Secret exists, creating new version..."
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 -d | \
              gcloud secrets versions add firebase-service-account \
                --data-file=- \
                --project=${{ secrets.GCP_PROJECT_ID }}
          else
            echo "Creating new secret..."
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 -d | \
              gcloud secrets create firebase-service-account \
                --data-file=- \
                --replication-policy=automatic \
                --project=${{ secrets.GCP_PROJECT_ID }}
          fi
          
          echo "Granting secret accessor permission to service account..."
          gcloud secrets add-iam-policy-binding firebase-service-account \
            --member="serviceAccount:${{ steps.runtime_sa.outputs.email }}" \
            --role="roles/secretmanager.secretAccessor" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Build & push image tagged with commit SHA
      - name: Build and push
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/app
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE --all-tags

      # Deploy to existing Cloud Run service
      - uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ steps.runtime_sa.outputs.email }}
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:us-central1:subscription-db
            --max-instances=10
            --min-instances=0
            --memory=2Gi
            --cpu=4
            --timeout=3600
            --cpu-boost
            --no-cpu-throttling
            --port=8080
          env_vars: |
            NODE_ENV=production
            DB_SYNC=false
            DB_MIGRATIONS=true
            DATABASE_HOST=/cloudsql/${{ secrets.GCP_PROJECT_ID }}:us-central1:subscription-db
            DATABASE_USER=nestjs_user
            DATABASE_NAME=subscription_db
            DB_RETRY_ATTEMPTS=0
            DB_RETRY_DELAY_MS=100
            DB_CONNECTION_TIMEOUT_MS=500
            API_PUBLIC_BASE_URL=https://subscription-backend-528466251837.us-central1.run.app
            FILE_STORAGE_DRIVER=gcs
            FILE_STORAGE_LOCAL_DIR=uploads
            GCS_BUCKET_NAME=box-subscription-system-images
            GCS_PUBLIC_BASE_URL=
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            STRIPE_PRICE_THE_WELLNESS_BOX_WEEKLY=${{ secrets.STRIPE_PRICE_THE_WELLNESS_BOX_WEEKLY }}
            STRIPE_PRICE_THE_WELLNESS_BOX_MONTHLY=${{ secrets.STRIPE_PRICE_THE_WELLNESS_BOX_MONTHLY }}
            STRIPE_PRICE_THE_WELLNESS_BOX_YEARLY=${{ secrets.STRIPE_PRICE_THE_WELLNESS_BOX_YEARLY }}
            STRIPE_PRICE_ECO_HOME_ESSENTIALS_WEEKLY=${{ secrets.STRIPE_PRICE_ECO_HOME_ESSENTIALS_WEEKLY }}
            STRIPE_PRICE_ECO_HOME_ESSENTIALS_MONTHLY=${{ secrets.STRIPE_PRICE_ECO_HOME_ESSENTIALS_MONTHLY }}
            STRIPE_PRICE_ECO_HOME_ESSENTIALS_YEARLY=${{ secrets.STRIPE_PRICE_ECO_HOME_ESSENTIALS_YEARLY }}
            STRIPE_PRICE_GAMERS_LOOT_WEEKLY=${{ secrets.STRIPE_PRICE_GAMERS_LOOT_WEEKLY }}
            STRIPE_PRICE_GAMERS_LOOT_MONTHLY=${{ secrets.STRIPE_PRICE_GAMERS_LOOT_MONTHLY }}
            STRIPE_PRICE_GAMERS_LOOT_YEARLY=${{ secrets.STRIPE_PRICE_GAMERS_LOOT_YEARLY }}
            STRIPE_PRICE_SNACK_STASH_EXPRESS_WEEKLY=${{ secrets.STRIPE_PRICE_SNACK_STASH_EXPRESS_WEEKLY }}
            STRIPE_PRICE_SNACK_STASH_EXPRESS_MONTHLY=${{ secrets.STRIPE_PRICE_SNACK_STASH_EXPRESS_MONTHLY }}
            STRIPE_PRICE_SNACK_STASH_EXPRESS_YEARLY=${{ secrets.STRIPE_PRICE_SNACK_STASH_EXPRESS_YEARLY }}
            STRIPE_PRICE_GLOW_RITUAL_BOX_WEEKLY=${{ secrets.STRIPE_PRICE_GLOW_RITUAL_BOX_WEEKLY }}
            STRIPE_PRICE_GLOW_RITUAL_BOX_MONTHLY=${{ secrets.STRIPE_PRICE_GLOW_RITUAL_BOX_MONTHLY }}
            STRIPE_PRICE_GLOW_RITUAL_BOX_YEARLY=${{ secrets.STRIPE_PRICE_GLOW_RITUAL_BOX_YEARLY }}
            GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase/service-account.json
          secrets: |
            DATABASE_PASSWORD=database-password:latest
            JWT_SECRET=jwt-secret:latest
            /secrets/firebase/service-account.json=firebase-service-account:latest
            STRIPE_SECRET_KEY=stripe-secret-key1:latest

      # Show deployment details
      - name: Show deployment info
        run: |
          echo "=========================================="
          echo "Deployment Successful!"
          echo "=========================================="
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
          echo "Service: subscription-backend"
          echo "Region: us-central1"
          echo ""
          echo "Test the API:"
          echo "  curl ${{ steps.deploy.outputs.url }}/health"
          echo ""
          echo "View logs:"
          echo "  gcloud run services logs tail subscription-backend --region=us-central1 --project=${{ secrets.GCP_PROJECT_ID }}"
          echo "=========================================="
